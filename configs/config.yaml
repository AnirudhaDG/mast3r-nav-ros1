# ============================================
# Episode Selection
# ============================================
# Set to true to process multiple episodes from episodes_dir
multi_episode: true

# Episode range (only used when multi_episode: true)
# -1 means no limit (start from 0 or go to end)
episode_start_idx: 0
episode_end_idx: -1

# Optional: list of specific episode names to run (takes priority over start/end_idx)
# If non-empty, only these episodes will be processed
# Example: ["episode_001", "episode_005", "episode_010"]
episode_list: ["y9hTuugGdiq_0000000_plant_14_", "yr17PDCnDDW_0000000_plant_32_", "ziup5kvtCCR_0000000_tv_monitor_8_", "zt1RVoi7PcG_0000000_bed_14_"]
# episode_list: ["p53SfW6mjZe_0000000_chair_13_", "q3zU7Yy5E5s_0000000_bed_23_", "q5QZSEeHe5g_0000000_plant_32_", "qyAac8rV8Zk_0000000_tv_monitor_8_", "svBbv1Pavdk_0000000_plant_7_", "wcojb4TFT35_0000000_bed_17_", "y9hTuugGdiq_0000000_plant_14_", "yr17PDCnDDW_0000000_plant_32_", "ziup5kvtCCR_0000000_tv_monitor_8_", "zt1RVoi7PcG_0000000_bed_14_"]

# Optional: txt file with episode names (1 per line) - takes priority over episode_list
# episode_list_file: null
episode_list_file: "/home/onyx/work_dirs/vanshg/navigation/mast3r-nav/episodes_removing_blacklist.txt"  # e.g., "/path/to/episodes.txt"

# Optional: list of episode names to skip
episode_blacklist: []

# ============================================
# Core Settings
# ============================================
goal_source: topological_pixelwise
device: 'cuda'

# Point cloud source: "gt_depth" (uses GT depth) or "mast3r" (infers pts3d)
pts3d_source: "mast3r"

# ============================================
# Logging & Visualization
# ============================================
log_results: true
save_visualizations: ${visualization.save_raw_data.enabled}