# KEY PARAMS
predict_dists: True
goal_type: "image_mask_enc" # ["image", "disabled", "image_mask_enc"]
goal_value_granularity: "pixel"
# goal_value_granularity: "mask"
goal_use_pl: 1 # if 1/2, use pl/pl2 weights to encode masks of 'curr img' else (0) use dino-pca ft of 'goal img'
obs_type: "disabled" # ["image", "disabled", "image_mask_enc"]
dims_segFt: 8
precomp: 2
goal_uses_context: True
goal_uses_stacked_context: False
is_pl_normalized: False
use_vel_filter: False
use_mask_grad: False

# navigation params, from deployment/src/navigate.py
close_threshold: 3
loc_radius: 4
waypoint_index: 5
fixed_plan: False

# model params
model_type: gnm
obs_encoding_size: 1024
goal_encoding_size: 1024

# normalization for the action space
normalize: True

# context
context_type: temporal # [temporal, randomized]
context_size: 5

# tradeoff between action and distance prediction loss
alpha: 0.5

# distance bounds for distance and action and distance predictions
distance:
    min_dist_cat: 0
    max_dist_cat: 20
action:
    min_dist_cat: 2
    max_dist_cat: 10
close_far_threshold: 10 # distance threshold used to seperate the close and the far  subgoals that are sampled per datapoint

# action output params
len_traj_pred: 10
learn_angle: True

# dataset specific parameters
image_size: [85, 64] # width, height

