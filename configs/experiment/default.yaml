# @package _global_
# Default experiment configuration for navigation tasks

exp_name: "benchmark_val_scenes_loc_rad4_subsample_ref1"
# exp_name: "test_exp"

# Task configuration
task_type: "original"  # Options: "original", "alt_goal", "alt_goal_v2"
reverse: false         # If true, navigate to start position (reverse navigation)

# Start state configuration
# Modes: "random" - sample random navigable points
#        "trajectory" - select from recorded trajectory at target distance from goal
#        "fixed_idx" - use specific trajectory index (set start_idx)
start_state_mode: "trajectory"
start_idx: -1                    # Trajectory index (only for fixed_idx mode)
max_start_distance: "hard"       # "easy" (3m), "hard" (5m), "full", or numeric value
max_steps: 300

# Goal/Success configuration
goal_distance_threshold: 1.0     # meters - distance to goal for success
goal_position_method: "trajectory"  # "trajectory" (from agent states) or "projection" (from 3D coords)

# Stuck detection
stuck_threshold: 0.01            # meters - minimum movement to not be considered stuck
stuck_window: 15                 # steps - window size for stuck detection

# Image/Map dimensions
image_width: 320
image_height: 240