# required paths
path_dataset: './data/'
path_models: ''
path_results: './out/results_tmp/'

# episode/task settings
start_idx: 0
step_idx: 1
end_idx: 108
reverse: False
task_type: "original" # from ["original", "alt_goal", "via_alt_goal"]
use_gt_localization: False
env: "sim" # from ["sim", "real"]

split: "val" # from ["train", "val"]
threshold_goal_distance: 1.0
max_start_distance: "easy" # from ["easy", "hard", "full"]
max_steps: 500

exp_name: "GTM_tango"

# running from list of winners or failure or no good
run_list: '' #'winners'  #  ['', 'winners', 'failures', 'no_good']
path_run: ''

# controller and mapping params
method: 'robohop+'
segmentor: 'sim' # [sim, fast_sam, sam, sam2, sam21]
goal_source: 'gt_metric'  # [gt_metric, gt_topological, gt_topometric, topological]
graph_filename: null
infer_depth: False
infer_traversable: False

# logging and display
log_wandb: False
log_robot: True
debug: False
except_exit: False # set True to disable try/except, print traceback, & exit

# tango's visualization panel
plot: False
save_vis: False
# dump_episode_images: 0

cull_qry_instances: False
cull_map_instances: False
cull_map_method: 'sim' # from ['sim', 'fast_sam']

sim:
  hfov: 120
  width: 320
  height: 240
  sensor_height: 0.4 # [0.4, 1.31, 1.5]
  sensor_height_map: 1.31

